<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED MORENO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="content">
            <h1>RED MORENO</h1>

            <div class="control-panel">
                <h3>Conectar Actores</h3>
                <input list="actor-list" id="source-actor" placeholder="Buscar Origen...">
                <input list="actor-list" id="target-actor" placeholder="Buscar Destino...">
                <datalist id="actor-list"></datalist>
                
                <select id="relation-type">
                    <option value="" disabled selected>Relación</option>
                    <option value="1">Dependencia jerárquica</option>
                    <option value="2">Relación positiva</option>
                    <option value="3">Relación negativa</option>
                    <option value="4">Relación técnica/funcional</option>
                    <option value="5">Financiación</option>
                    <option value="6">Presión / Reclamo</option>
                    <option value="7">Regulación / Control</option>
                </select>
                <button id="add-connection">Conectar</button>

                <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 5px 0;">

                <h3>Gestión de Actores</h3>
                <input type="text" id="new-actor-name" placeholder="Nombre del nuevo actor...">
                <select id="new-actor-parent">
                    <option value="" disabled selected>Seleccionar Subcategoría Padre...</option>
                </select>
                <button id="add-actor">Añadir Actor</button>

                <input list="actor-list" id="delete-actor-name" placeholder="Actor a eliminar...">
                <button id="delete-actor" style="background: #e74c3c;">Eliminar Actor</button>

                <hr style="width: 100%; border: 0; border-top: 1px solid #eee; margin: 5px 0;">

                <h3>Exportar Gráfico</h3>
                <div style="display: flex; gap: 5px;">
                    <button id="export-jpg" style="flex: 1; background: #2980b9;">JPG</button>
                    <button id="export-pdf" style="flex: 1; background: #27ae60;">PDF</button>
                </div>
            </div>

        </div>

        <div class="legend">
            <div class="legend-item">
                <span class="dot" style="background: #9E9E9E;"></span>
                <span>Dependencia jerárquica</span>
            </div>
            <div class="legend-item">
                <span class="dot" style="background: #6B8E23;"></span>
                <span>Relación positiva</span>
            </div>
            <div class="legend-item">
                <span class="dot" style="background: #FF7675;"></span>
                <span>Relación negativa</span>
            </div>
            <div class="legend-item">
                <span class="dot" style="background: #F39C12;"></span>
                <span>Relación técnica/funcional</span>
            </div>
            <div class="legend-item">
                <span class="dot" style="background: #27AE60;"></span>
                <span>Financiación</span>
            </div>
            <div class="legend-item">
                <span class="dot" style="background: #C0392B;"></span>
                <span>Presión / Reclamo</span>
            </div>
            <div class="legend-item">
                <span class="dot" style="background: #8E44AD;"></span>
                <span>Regulación / Control</span>
            </div>
        </div>

        <svg id="viz"></svg>
    </div>
    <script src="main.js"></script>
</body>
</html>
