<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED MORENO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="content">
            <h1>RED MORENO</h1>
            <p>Dynamic Interactive Taxonomy</p>

            <div class="control-panel">
                <h3>Conectar Actores</h3>
                <select id="source-actor">
                    <option value="" disabled selected>Origen</option>
                </select>
                <select id="target-actor">
                    <option value="" disabled selected>Destino</option>
                </select>
                <select id="relation-type">
                    <option value="" disabled selected>Relación</option>
                    <option value="1">Dependencia jerárquica</option>
                    <option value="2">Relación positiva</option>
                    <option value="3">Relación negativa</option>
                    <option value="4">Relación técnica/funcional</option>
                    <option value="5">Financiación</option>
                    <option value="6">Presión / Reclamo</option>
                    <option value="7">Regulación / Control</option>
                </select>
                <button id="add-connection">Conectar</button>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <span class="dot" style="background: #9E9E9E;"></span>
                    <span>Dependencia jerárquica</span>
                </div>
                <div class="legend-item">
                    <span class="dot" style="background: #6B8E23;"></span>
                    <span>Relación positiva</span>
                </div>
                <div class="legend-item">
                    <span class="dot" style="background: #FF7675;"></span>
                    <span>Relación negativa</span>
                </div>
                <div class="legend-item">
                    <span class="dot" style="background: #F39C12;"></span>
                    <span>Relación técnica/funcional</span>
                </div>
                <div class="legend-item">
                    <span class="dot" style="background: #27AE60;"></span>
                    <span>Financiación</span>
                </div>
                <div class="legend-item">
                    <span class="dot" style="background: #C0392B;"></span>
                    <span>Presión / Reclamo</span>
                </div>
                <div class="legend-item">
                    <span class="dot" style="background: #8E44AD;"></span>
                    <span>Regulación / Control</span>
                </div>
            </div>
        </div>

        <svg id="viz"></svg>
    </div>
    <script src="main.js"></script>
</body>
</html>
